<!DOCTYPE html>
<html>
<head>
    <title>Development App - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .container {
            max-width: 400px;
            margin: 40px auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .content {
            padding: 30px;
        }
        h2 {
            margin-top: 0;
            color: #333;
            text-align: center;
            font-weight: 600;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        input:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 14px rgba(102, 126, 234, 0.3);
        }
        .btn:active {
            transform: translateY(0);
        }
        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        .register-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 5px;
            text-align: center;
            font-weight: 500;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .token-display {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 5px;
            border: 1px dashed #adb5bd;
            font-family: monospace;
            font-size: 14px;
            word-break: break-all;
            display: none;
        }
        .token-display h4 {
            margin-top: 0;
            color: #495057;
        }
        .security-note {
            margin-top: 25px;
            padding: 15px;
            background-color: #fff3cd;
            border-radius: 5px;
            border: 1px solid #ffeaa7;
            color: #856404;
            font-size: 14px;
        }
        .security-note strong {
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Development App</h1>
        <p>Secure authentication system</p>
    </div>
    
    <div class="container">
        <div class="content">
            <h2>Login to Your Account</h2>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                
                <button type="submit" class="btn">Login</button>
            </form>
            
            <div class="register-link">
                <p>Don't have an account? <a href="/register">Register here</a></p>
            </div>
            
            <div id="message" class="message"></div>
            
            <div class="security-note">
                <strong>Security Note:</strong> This is a development app with security features enabled.
                Passwords are securely hashed using bcrypt. Sessions are used for authentication.
            </div>
        </div>
    </div>
    
    <script>
        $(document).ready(function() {
            // Handle login form submission
            $('#login-form').on('submit', function(e) {
                e.preventDefault();
                
                const username = $('#username').val().trim();
                const password = $('#password').val();
                
                if (!username || !password) {
                    showMessage('Please enter both username and password.', 'error');
                    return;
                }
                
                const formData = {
                    username: username,
                    password: password
                };
                
                // Show loading state
                const submitBtn = $(this).find('.btn');
                const originalText = submitBtn.text();
                submitBtn.text('Logging in...').prop('disabled', true);
                
                $.ajax({
                    url: '/login',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(formData),
                    success: function(data) {
                        if (data.success) {
                            showMessage('Login successful! Redirecting to dashboard...', 'success');
                            $('#login-form')[0].reset();
                            
                            // Redirect to dashboard after short delay
                            setTimeout(function() {
                                window.location.href = data.redirect || '/dashboard';
                            }, 1000);
                        } else {
                            showMessage('Login failed: ' + (data.error || 'Unknown error'), 'error');
                        }
                    },
                    error: function(xhr) {
                        try {
                            const data = JSON.parse(xhr.responseText);
                            showMessage('Login failed: ' + data.error, 'error');
                        } catch (e) {
                            showMessage('Login failed. Please try again.', 'error');
                        }
                    },
                    complete: function() {
                        submitBtn.text(originalText).prop('disabled', false);
                    }
                });
            });
            
            function showMessage(text, type) {
                const messageDiv = $('#message');
                messageDiv.removeClass('success error info').addClass(type);
                messageDiv.text(text).show();
                
                // Auto-hide success messages after 5 seconds
                if (type === 'success') {
                    setTimeout(function() {
                        messageDiv.fadeOut();
                    }, 5000);
                }
            }
        });
    </script>
</body>
</html>
