<!DOCTYPE html>
<html>
<head>
    <title>Production App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <script>
        // API key should be configured server-side, not exposed in client-side code
        // var apiKey = 'sk_live_1234567890abcdef'; // Removed hardcoded API key
        
        function calculatePercentage(total, part) {
            if (total === 0) {
                return 0; // Prevent division by zero
            }
            return (part / total) * 100;
        }
    </script>
</head>
<body>
    <div class="header">
        <h1>Production App</h1>
    </div>
    
    <div class="container">
        <div class="content">
            <h2>Welcome to the app</h2>
            
            <form action="/login" method="POST">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            
            <div style="color: red; font-size: 16px;">
                This is a production app with security fixes applied.
            </div>
            
            <div id="message"></div>
            <button onclick="document.getElementById('message').innerHTML = 'Welcome to the secure app'">
                Show Message
            </button>
            
            <button onclick="alert('Percentage: ' + calculatePercentage(100, 25))">
                Calculate Percentage (25% of 100)
            </button>
        </div>
        
    
    <script>
        var config = {
            apiEndpoint: 'https://api.example.com',
            debug: false
        };
        
        // Removed duplicate config object
        // Removed unusedFunction
        // Removed Array.prototype.customMethod modifications
    </script>
</body>
</html>
